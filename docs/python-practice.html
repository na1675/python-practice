<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python 练习站</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.3/full/pyodide.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --ink:#1B2433;
  --ink-soft:#5B6B7D;
  --paper:#F1F5F9;
  --paper-raised:#FFFFFF;
  --blue:#2F6F9E;
  --blue-deep:#1F4E73;
  --blue-tint:#E4EEF5;
  --yellow:#F2B705;
  --yellow-deep:#B9860A;
  --line:#CBD5E1;
  --correct:#2F8F5B;
  --correct-bg:#E4F5EC;
  --wrong:#C1503F;
  --wrong-bg:#FBEAE6;
  --locked:#A8B3BF;
  --purple:#7A5CC0;
  --purple-bg:#EEE9FA;
  --radius:14px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  padding:32px 18px 80px;
}

.wrap{max-width:880px;margin:0 auto;}

/* ---------- Header ---------- */
.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  letter-spacing:0.14em;
  color:var(--blue);
  font-weight:600;
  text-transform:uppercase;
}
h1{
  font-family:'Sora',sans-serif;
  font-size:34px;
  font-weight:800;
  margin:6px 0 4px;
  letter-spacing:-0.01em;
}
.subtitle{
  color:var(--ink-soft);
  font-size:15px;
  margin:0 0 22px;
  max-width:600px;
  line-height:1.5;
}

/* ---------- Mode toggle ---------- */
.mode-toggle{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}
.mode-pill{
  flex:1;
  font-family:'Sora',sans-serif;
  font-weight:700;
  font-size:14.5px;
  padding:13px 16px;
  border-radius:12px;
  border:1.5px solid var(--line);
  background:var(--paper-raised);
  color:var(--ink-soft);
  cursor:pointer;
  text-align:center;
  transition:all .12s ease;
}
.mode-pill .sub{display:block; font-family:'Inter',sans-serif; font-weight:400; font-size:11.5px; margin-top:2px; opacity:.75;}
.mode-pill.active{background:var(--blue); border-color:var(--blue); color:#fff;}

/* ---------- Journey map ---------- */
.map{
  background:var(--paper-raised);
  border-radius:var(--radius);
  padding:22px 20px 16px;
  box-shadow:0 1px 2px rgba(27,36,51,0.06), 0 8px 24px -12px rgba(27,36,51,0.12);
  margin-bottom:14px;
  overflow-x:auto;
}
.map-track{
  display:flex;
  align-items:flex-start;
  min-width:max-content;
  position:relative;
  padding:0 4px;
}
.station{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:112px;
  cursor:pointer;
  position:relative;
  background:none;
  border:none;
  font-family:inherit;
  padding:0;
}
.station:not(.locked):hover .dot{transform:scale(1.08);}
.station.locked{cursor:default;}
.rail{
  position:absolute;
  top:19px;
  left:56px;
  right:56px;
  height:3px;
  background:var(--line);
  z-index:0;
}
.dot{
  width:38px;height:38px;
  border-radius:50%;
  background:var(--paper-raised);
  border:3px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-weight:600;
  font-size:14px;
  color:var(--ink-soft);
  position:relative;z-index:1;
  transition:transform .15s ease, border-color .15s ease, background .15s ease, color .15s ease;
  flex-shrink:0;
}
.station.unlocked .dot{border-color:var(--blue); color:var(--blue);}
.station.active .dot{background:var(--blue); border-color:var(--blue); color:#fff;}
.station.locked .dot{color:var(--locked);}
.station-label{
  margin-top:9px;
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  text-align:center;
  line-height:1.3;
  white-space:pre-line;
}
.station.active .station-label{color:var(--blue-deep);}
.station.locked .station-label{color:var(--locked);}
.station-sub{
  font-size:10.5px;
  color:var(--locked);
  margin-top:2px;
}

/* ---------- weak toggle ---------- */
.weak-row{margin-bottom:20px;}
.weak-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:'Sora',sans-serif;
  font-weight:700;
  font-size:13px;
  padding:10px 16px;
  border-radius:999px;
  border:1.5px solid var(--purple);
  background:var(--paper-raised);
  color:var(--purple);
  cursor:pointer;
}
.weak-btn.active{background:var(--purple); color:#fff;}
.weak-hint{font-size:12px; color:var(--ink-soft); margin-top:6px;}

/* ---------- Score bar ---------- */
.scorebar{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  align-items:center;
  font-family:'JetBrains Mono',monospace;
  font-size:12.5px;
  color:var(--ink-soft);
  margin-bottom:20px;
  padding:0 4px;
}
.scorebar b{color:var(--ink); font-weight:600;}
.scorebar .sep{color:var(--line);}
.reset-link{
  margin-left:auto;
  color:var(--ink-soft);
  text-decoration:underline;
  cursor:pointer;
  background:none;border:none;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
}
.pyo-status{
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;
  color:var(--ink-soft);
}
.pyo-status.ready{color:var(--correct);}

/* ---------- Question card (shared) ---------- */
.card{
  background:var(--paper-raised);
  border-radius:var(--radius);
  padding:28px 26px 24px;
  box-shadow:0 1px 2px rgba(27,36,51,0.06), 0 8px 24px -12px rgba(27,36,51,0.12);
}
.tag-row{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
.tag{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:600;
  padding:4px 10px;
  border-radius:999px;
  letter-spacing:0.02em;
}
.tag.topic{background:var(--blue-tint); color:var(--blue-deep);}
.tag.type{background:#FCF1D2; color:var(--yellow-deep);}
.tag.weak{background:var(--purple-bg); color:var(--purple);}

.prompt{
  font-size:17px;
  font-weight:600;
  line-height:1.55;
  margin-bottom:16px;
  white-space:pre-wrap;
}

pre.code-block{
  background:var(--ink);
  color:#E7EEF5;
  font-family:'JetBrains Mono',monospace;
  font-size:13.5px;
  line-height:1.65;
  padding:16px 18px;
  border-radius:10px;
  overflow-x:auto;
  margin:0 0 18px;
  white-space:pre-wrap;
}

/* mcq options */
.options{display:flex; flex-direction:column; gap:10px; margin-bottom:6px;}
.option{
  display:flex;
  align-items:center;
  gap:12px;
  text-align:left;
  padding:12px 14px;
  border-radius:10px;
  border:1.5px solid var(--line);
  background:var(--paper-raised);
  cursor:pointer;
  font-family:'Inter',sans-serif;
  font-size:14.5px;
  color:var(--ink);
  transition:border-color .12s ease, background .12s ease;
}
.option:hover:not(:disabled){border-color:var(--blue);}
.option .letter{
  font-family:'JetBrains Mono',monospace;
  font-weight:700;
  font-size:12.5px;
  width:22px;height:22px;
  border-radius:6px;
  background:var(--blue-tint);
  color:var(--blue-deep);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.option.correct{border-color:var(--correct); background:var(--correct-bg);}
.option.wrong{border-color:var(--wrong); background:var(--wrong-bg);}
.option:disabled{cursor:default;}

.btn{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:14px;
  padding:11px 20px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:var(--blue);
  color:#fff;
  transition:background .12s ease, opacity .12s ease;
}
.btn:hover{background:var(--blue-deep);}
.btn:disabled{background:var(--line); cursor:default; opacity:.7;}
.btn.ghost{
  background:none;
  border:1.5px solid var(--line);
  color:var(--ink-soft);
}
.btn.ghost:hover{border-color:var(--blue); color:var(--blue);}
.btn.warn{
  background:none;
  border:1.5px solid var(--wrong);
  color:var(--wrong);
}
.btn.warn:hover{background:var(--wrong-bg);}

.feedback{
  margin-top:16px;
  padding:14px 16px;
  border-radius:10px;
  font-size:14px;
  line-height:1.6;
  display:none;
}
.feedback.show{display:block;}
.feedback.ok{background:var(--correct-bg); color:#1E5E3D;}
.feedback.bad{background:var(--wrong-bg); color:#8A3226;}
.feedback .head{font-weight:700; margin-bottom:4px;}
.feedback pre{white-space:pre-wrap; font-family:'JetBrains Mono',monospace; font-size:12.5px; margin:6px 0 0;}

.card-footer{
  display:flex;
  justify-content:flex-end;
  margin-top:20px;
  gap:10px;
  flex-wrap:wrap;
}

.locked-note{
  color:var(--ink-soft);
  font-size:14px;
  text-align:center;
  padding:40px 20px;
  line-height:1.7;
}
.locked-note b{color:var(--ink);}

/* ---------- code exercise ---------- */
.hint-box{
  background:var(--blue-tint);
  border-radius:10px;
  padding:12px 14px;
  margin-bottom:16px;
  font-size:13.5px;
  color:var(--blue-deep);
  line-height:1.6;
}
.hint-box ol{margin:4px 0 0; padding-left:18px;}
.hint-actions{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;}

textarea.editor{
  width:100%;
  min-height:170px;
  font-family:'JetBrains Mono',monospace;
  font-size:14px;
  line-height:1.6;
  padding:14px 16px;
  border-radius:10px;
  border:1.5px solid var(--line);
  background:#0F1720;
  color:#E7EEF5;
  resize:vertical;
  tab-size:4;
}
textarea.editor:focus{outline:none; border-color:var(--blue);}

.run-row{display:flex; gap:10px; margin:14px 0 4px; flex-wrap:wrap;}

.solution-box{
  margin-top:14px;
  border-radius:10px;
  overflow:hidden;
  border:1.5px solid var(--yellow);
}
.solution-head{
  background:#FCF1D2;
  color:var(--yellow-deep);
  font-weight:700;
  font-size:13px;
  padding:9px 14px;
}

.stat-code b{color:var(--ink);}

@media (max-width:520px){
  h1{font-size:27px;}
  .card{padding:22px 18px 20px;}
  .prompt{font-size:16px;}
  .mode-toggle{flex-direction:column;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="eyebrow">PYTHON · 练习站</div>
  <h1>代码练习站</h1>
  <p class="subtitle">跟着学习进度出题。选择题会按错误率自动找薄弱项反复练；写代码题真实在浏览器里运行 Python，写错了可以反复改，实在写不出来再看答案。</p>

  <div class="mode-toggle">
    <button class="mode-pill active" id="modeMcqBtn">
      选择题闯关
      <span class="sub">巩固概念 · 薄弱强化</span>
    </button>
    <button class="mode-pill" id="modeCodeBtn">
      写代码练习
      <span class="sub">真实运行 · 反复试错</span>
    </button>
  </div>

  <div class="map">
    <div class="map-track" id="mapTrack"></div>
  </div>

  <div class="weak-row" id="weakRow">
    <button class="weak-btn" id="weakBtn">🎯 薄弱强化：按错误率智能出题</button>
    <div class="weak-hint">开启后会优先给你之前答错次数多的题目，答得越准，出现频率会自动降低。</div>
  </div>

  <div class="scorebar" id="scorebar"></div>

  <div class="card" id="card"></div>

</div>

<script>
/* =========================================================
   通用工具：存储（在 claude.ai 里用 window.storage，独立部署
   到 GitHub Pages 等地方时自动改用 localStorage，两边都能用）
   ========================================================= */
async function storeGet(key){
  if(typeof window.storage !== 'undefined' && window.storage){
    try{
      const r = await window.storage.get(key, false);
      return r ? JSON.parse(r.value) : null;
    }catch(e){ return null; }
  }
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
async function storeSet(key, value){
  if(typeof window.storage !== 'undefined' && window.storage){
    try{ await window.storage.set(key, JSON.stringify(value), false); return; }catch(e){ /* 落到 localStorage 兜底 */ }
  }
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
}

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function normalize(s){
  return String(s).trim().toLowerCase().replace(/\s+/g,'');
}
function weightedPick(items, weightFn){
  const weights = items.map(weightFn);
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random()*total;
  for(let i=0;i<items.length;i++){
    r -= weights[i];
    if(r<=0) return items[i];
  }
  return items[items.length-1];
}

/* =========================================================
   TOPICS：章节地图。以后学到新章节，只需要：
   1. 把对应 locked:true 的占位改成 locked:false，再加一个新的 locked 占位
   2. 在 QUESTION_BANK / CODE_GROUPS 里按同样结构追加题目
   ========================================================= */
const TOPICS = [
  { id:'all',        label:'综合',            sub:'全部混合', locked:false },
  { id:'basic',      label:'数据类型\n与变量', sub:'第一关',   locked:false },
  { id:'list_tuple', label:'List\n与 Tuple',   sub:'第二关',   locked:false },
  { id:'dict_set',   label:'Dict\n与 Set',     sub:'第三关',   locked:false },
  { id:'future',     label:'下一关',           sub:'敬请期待', locked:true },
];
const TOPIC_LABEL = { basic:'数据类型与变量', list_tuple:'List 与 Tuple', dict_set:'Dict 与 Set' };

/* =========================================================
   选择题题库
   ========================================================= */
const QUESTION_BANK = [
  { id:'b1', topic:'basic', type:'mcq',
    prompt:'下面哪一个是 Python 中的浮点数？',
    options:['10', "'10'", '10.0', 'True'],
    correct:2,
    explain:'10.0 带小数点，是 float；10 是 int；\'10\' 加了引号是字符串；True 是布尔值。' },
  { id:'b2', topic:'basic', type:'code',
    prompt:'type(5 / 2) 的结果类型名是什么？（不要引号，比如写 int 或 float）',
    answers:['float'],
    explain:'除法 / 的结果永远是浮点数，哪怕两个数刚好整除。' },
  { id:'b3', topic:'basic', type:'mcq',
    prompt:'下面哪个变量名是合法的？',
    options:['2name', 'user_name', 'user-name', 'user name'],
    correct:1,
    explain:'变量名只能用字母、数字、下划线，且不能以数字开头，不能有空格或减号。' },
  { id:'b4', topic:'basic', type:'code',
    prompt:'运行下面代码，最后打印出来的结果是多少？',
    code:'a = 10\nb = a\na = 20\nprint(b)',
    answers:['10'],
    explain:'b = a 让 b 指向 a 当时指向的值 10；之后 a 改指向 20，但 b 不会跟着变。' },
  { id:'b5', topic:'basic', type:'mcq',
    prompt:"f'{3.1415926:.2f}' 的结果是？",
    options:['3.14', '3.1415926', '3.1', '3.142'],
    correct:0,
    explain:'.2f 表示保留两位小数，会四舍五入。' },
  { id:'b6', topic:'basic', type:'code',
    prompt:'print(2 ** 3) 的结果是？',
    answers:['8'],
    explain:'** 是求幂运算，2 的 3 次方是 8。' },
  { id:'b7', topic:'basic', type:'mcq',
    prompt:'关于 Python 变量，下面说法正确的是？',
    options:['定义变量前必须先声明类型','同一个变量不能先后存不同类型的数据','变量的本质是指向某块内存','变量名可以用中划线 - 连接'],
    correct:2,
    explain:'Python 是动态语言，不用提前声明类型；变量的本质是"指向"，可以先后指向不同类型的数据。' },

  { id:'l1', topic:'list_tuple', type:'mcq',
    prompt:'下面哪种写法能创建一个只有一个元素的元组？',
    options:['(5)', '(5,)', '[5]', '{5}'],
    correct:1,
    explain:'元组只有一个元素时必须加逗号，否则 (5) 只是数字 5，不是元组。' },
  { id:'l2', topic:'list_tuple', type:'code',
    prompt:'下面代码会打印出几个元素？（只写数字）',
    code:"fruits = ['苹果','香蕉','橙子','葡萄']\nprint(fruits[1:3])",
    answers:['2'],
    explain:'切片 [1:3] 是左闭右开，取得到下标 1 和 2，共 2 个元素。' },
  { id:'l3', topic:'list_tuple', type:'mcq',
    prompt:'list 和 tuple 最核心的区别是？',
    options:['list 用中括号，tuple 用大括号','list 可以修改，tuple 不能修改','tuple 元素类型必须一样','list 不能用下标访问'],
    correct:1,
    explain:'两者都是有序集合，核心区别在于 list 能增删改，tuple 一旦创建就不能改。' },
  { id:'l4', topic:'list_tuple', type:'code',
    prompt:'下面代码的运行结果是？（写数字）',
    code:'t = (1, 2, 3)\nprint(len(t + (4, 5)))',
    answers:['5'],
    explain:'元组拼接后变成 (1,2,3,4,5)，长度是 5。' },
  { id:'l5', topic:'list_tuple', type:'mcq',
    prompt:'下面代码运行后，tuple1 打印出来的内容会变化吗？',
    code:"list1 = [1, 2]\ntuple1 = ('a', list1)\nlist1[0] = 99\nprint(tuple1)",
    options:['会变，因为 list1 的内容变了，tuple1 里那一项跟着显示新内容','不会变，tuple 绝对不可变，不管里面装的是什么','会报错，因为 tuple 不允许包含 list','会变，但要重新给 tuple1 赋值才生效'],
    correct:0,
    explain:'元组"不可变"指的是每个位置指向谁不变；但如果指向的是一个 list，那个 list 自己的内容还是能改的。' },
  { id:'l6', topic:'list_tuple', type:'code',
    prompt:'下面代码运行后打印的结果是？（写数字）',
    code:'nums = [3, 1, 2]\nnums.sort()\nprint(nums[0])',
    answers:['1'],
    explain:'sort() 默认从小到大排序，排序后 nums 是 [1, 2, 3]，下标 0 是 1。' },
  { id:'l7', topic:'list_tuple', type:'mcq',
    prompt:'想在列表末尾添加一个新元素，应该用哪个方法？',
    options:['list.insert()','list.append()','list.add()','list.push()'],
    correct:1,
    explain:'append() 是在列表末尾添加一个新元素；insert() 是插入到指定位置。' },

  { id:'d1', topic:'dict_set', type:'mcq',
    prompt:'字典的键（key）可以是下面哪种类型？',
    options:['list','dict','tuple','set'],
    correct:2,
    explain:'键必须是不可变类型，tuple 是不可变的可以当键；list / dict / set 都是可变的，不能当键。' },
  { id:'d2', topic:'dict_set', type:'code',
    prompt:'下面代码运行后，len(phone) 的结果是？（写数字）',
    code:"phone = {'小明': '111', '小红': '222'}\nphone['小明'] = '999'",
    answers:['2'],
    explain:"'小明' 这个键已经存在，再次赋值是修改不是新增，字典还是 2 组键值对。" },
  { id:'d3', topic:'dict_set', type:'mcq',
    prompt:'下面哪种写法可以安全取值，即使键不存在也不会报错？',
    options:["phone['小明']","phone.get('小明', '未知')","phone.value('小明')","phone -> '小明'"],
    correct:1,
    explain:'get(key, 默认值) 在键不存在时返回默认值，不会报错；直接用 [] 取不存在的键会报错。' },
  { id:'d4', topic:'dict_set', type:'code',
    prompt:'下面代码运行后打印的结果是？（写数字）',
    code:'a = {1, 2, 3}\nb = {2, 3, 4}\nprint(len(a & b))',
    answers:['2'],
    explain:'交集 a & b 是 {2, 3}，长度是 2。' },
  { id:'d5', topic:'dict_set', type:'mcq',

/* =========================================================
   Pyodide 初始化（后台悄悄加载，不阻塞页面）
   ========================================================= */
async function ensurePyodide(){
  if(pyodideReady) return pyodideInstance;
  if(pyodideLoading){
    // 等待正在进行的加载
    while(!pyodideReady){ await new Promise(r=>setTimeout(r,150)); }
    return pyodideInstance;
  }
  pyodideLoading = true;
  updatePyoStatus();
  try{
    pyodideInstance = await loadPyodide();
    pyodideReady = true;
  }catch(e){
    pyodideReady = false;
  }
  pyodideLoading = false;
  updatePyoStatus();
  return pyodideInstance;
}

function updatePyoStatus(){
  const el = document.getElementById('pyoStatus');
  if(!el) return;
  if(pyodideReady){
    el.textContent = '🐍 Python 环境已就绪';
    el.classList.add('ready');
  }else if(pyodideLoading){
    el.textContent = '🐍 Python 环境加载中…（第一次会慢一点）';
    el.classList.remove('ready');
  }else{
    el.textContent = '';
  }
  const runBtn = document.getElementById('runBtn');
  if(runBtn) runBtn.disabled = !pyodideReady;
}

async function runPythonCheck(userCode, testCode){
  const pyodide = await ensurePyodide();
  if(!pyodide) return { ok:false, error:'Python 环境加载失败，刷新页面再试试。' };
  pyodide.runPython(`
import sys, io
sys.stdout = io.StringIO()
sys.stderr = io.StringIO()
`);
  const g = pyodide.globals.get('dict')();
  try{
    await pyodide.runPythonAsync(userCode + '\n' + testCode, { globals: g });
    return { ok:true };
  }catch(err){
    let msg = String(err.message || err);
    const lines = msg.split('\n').filter(l=>l.trim().length>0);
    msg = lines.slice(-3).join('\n');
    return { ok:false, error: msg };
  }finally{
    try{ pyodide.runPython('sys.stdout = sys.__stdout__; sys.stderr = sys.__stderr__'); }catch(e){}
    try{ g.destroy(); }catch(e){}
  }
}

/* =========================================================
   选择题模式
   ========================================================= */
function buildMcqPool(){
  if(mcq.weak){
    const withStats = QUESTION_BANK.map(q=>{
      const s = mcq.stats[q.id] || {attempts:0, wrong:0};
      return { q, weight: 1 + s.wrong*4 + (s.attempts===0?1:0) };
    });
    const arr = [];
    // 生成一个加权抽样的顺序列表（抽 20 道，抽不重复优先，用完可重复）
    const pool = withStats.slice();
    for(let i=0;i<20 && pool.length>0;i++){
      const picked = weightedPick(pool, x=>x.weight);
      arr.push(picked.q);
    }
    mcq.pool = arr;
  }else{
    const list = mcq.topic==='all' ? QUESTION_BANK.slice() : QUESTION_BANK.filter(q=>q.topic===mcq.topic);
    mcq.pool = shuffle(list);
  }
  mcq.index = 0;
}
function switchMcqTopic(topicId){
  mcq.topic = topicId;
  mcq.weak = false;
  buildMcqPool();
  renderMap();
  renderMcqQuestion();
}
function currentMcqQuestion(){
  if(mcq.pool.length===0) return null;
  return mcq.pool[mcq.index % mcq.pool.length];
}

function renderMcqQuestion(){
  const card = document.getElementById('card');
  const q = currentMcqQuestion();
  mcq.answered = false;
  card.innerHTML = '';
  if(!q){ return; }

  const tagRow = document.createElement('div');
  tagRow.className = 'tag-row';
  const tagTopic = document.createElement('span');
  tagTopic.className = 'tag topic';
  tagTopic.textContent = TOPIC_LABEL[q.topic];
  tagRow.appendChild(tagTopic);
  const tagType = document.createElement('span');
  tagType.className = 'tag type';
  tagType.textContent = q.type==='mcq' ? '选择题' : '写答案';
  tagRow.appendChild(tagType);
  if(mcq.weak){
    const tagWeak = document.createElement('span');
    tagWeak.className = 'tag weak';
    tagWeak.textContent = '薄弱强化';
    tagRow.appendChild(tagWeak);
  }
  card.appendChild(tagRow);

  const prompt = document.createElement('div');
  prompt.className = 'prompt';
  prompt.textContent = q.prompt;
  card.appendChild(prompt);

  if(q.code){
    const pre = document.createElement('pre');
    pre.className = 'code-block';
    pre.textContent = q.code;
    card.appendChild(pre);
  }

  const feedback = document.createElement('div');
  feedback.className = 'feedback';

  if(q.type === 'mcq'){
    const optWrap = document.createElement('div');
    optWrap.className = 'options';
    const letters = ['A','B','C','D','E'];
    q.options.forEach((opt,i)=>{
      const b = document.createElement('button');
      b.className = 'option';
      const letter = document.createElement('span');
      letter.className = 'letter';
      letter.textContent = letters[i];
      const text = document.createElement('span');
      text.textContent = opt;
      b.appendChild(letter); b.appendChild(text);
      b.addEventListener('click', ()=> handleMcqAnswer(q, i, optWrap, feedback));
      optWrap.appendChild(b);
    });
    card.appendChild(optWrap);
  }else{
    const wrap = document.createElement('div');
    wrap.className = 'run-row';
    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = '在这里写答案';
    input.style.cssText = 'flex:1;min-width:180px;font-family:JetBrains Mono,monospace;font-size:14.5px;padding:12px 14px;border-radius:10px;border:1.5px solid var(--line);';
    const submit = document.createElement('button');
    submit.className = 'btn';
    submit.textContent = '提交';
    submit.addEventListener('click', ()=> handleFillAnswer(q, input, submit, feedback));
    input.addEventListener('keydown', e=>{ if(e.key==='Enter') submit.click(); });
    wrap.appendChild(input); wrap.appendChild(submit);
    card.appendChild(wrap);
  }

  card.appendChild(feedback);

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn ghost';
  nextBtn.textContent = '下一题';
  nextBtn.disabled = true;
  nextBtn.id = 'mcqNextBtn';
  nextBtn.addEventListener('click', ()=>{ mcq.index++; renderMcqQuestion(); });
  footer.appendChild(nextBtn);
  card.appendChild(footer);
}

async function recordMcqResult(q, isCorrect){
  const s = mcq.stats[q.id] || {attempts:0, wrong:0};
  s.attempts++;
  if(!isCorrect) s.wrong++;
  mcq.stats[q.id] = s;
  await saveMcqProgress();
  renderScorebar();
}

function showMcqFeedback(feedback, isCorrect, explain){
  feedback.className = 'feedback show ' + (isCorrect?'ok':'bad');
  feedback.innerHTML = '';
  const head = document.createElement('div');
  head.className = 'head';
  head.textContent = isCorrect ? '✅ 回答正确！' : '❌ 回答错误';
  const body = document.createElement('div');
  body.textContent = explain;
  feedback.appendChild(head); feedback.appendChild(body);
  document.getElementById('mcqNextBtn').disabled = false;
}

function handleMcqAnswer(q, chosenIndex, optWrap, feedback){
  if(mcq.answered) return;
  mcq.answered = true;
  const buttons = optWrap.querySelectorAll('.option');
  buttons.forEach(b=>b.disabled=true);
  const isCorrect = chosenIndex === q.correct;
  buttons[chosenIndex].classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect) buttons[q.correct].classList.add('correct');
  recordMcqResult(q, isCorrect);
  showMcqFeedback(feedback, isCorrect, q.explain);
}
function handleFillAnswer(q, input, submitBtn, feedback){
  if(mcq.answered) return;
  mcq.answered = true;
  const val = normalize(input.value);
  const isCorrect = q.answers.some(a=>normalize(a)===val);
  input.disabled = true; submitBtn.disabled = true;
  input.style.borderColor = isCorrect ? 'var(--correct)' : 'var(--wrong)';
  recordMcqResult(q, isCorrect);
  showMcqFeedback(feedback, isCorrect, q.explain);
}

/* =========================================================
   写代码模式
   ========================================================= */
function buildCodePool(){
  const list = code.topic==='all' ? CODE_GROUPS.slice() : CODE_GROUPS.filter(g=>g.topic===code.topic);
  code.groupPool = shuffle(list);
  code.groupIndex = 0;
  pickVariant(null);
}
function switchCodeTopic(topicId){
  code.topic = topicId;
  buildCodePool();
  renderMap();
  renderCodeQuestion();
}
function currentGroup(){
  if(code.groupPool.length===0) return null;
  return code.groupPool[code.groupIndex % code.groupPool.length];
}
function pickVariant(excludeId){
  const g = currentGroup();
  if(!g){ code.variant = null; return; }
  let options = g.variants;
  if(excludeId) options = g.variants.filter(v=>v.id!==excludeId);
  if(options.length===0) options = g.variants;
  code.variant = options[Math.floor(Math.random()*options.length)];
  code.revealed = false;
  code.hintCount = 0;
}

function renderCodeQuestion(){
  const card = document.getElementById('card');
  const g = currentGroup();
  card.innerHTML = '';
  if(!g || !code.variant){
    return;
  }
  const v = code.variant;

  const tagRow = document.createElement('div');
  tagRow.className = 'tag-row';
  const tagTopic = document.createElement('span');
  tagTopic.className = 'tag topic';
  tagTopic.textContent = TOPIC_LABEL[g.topic] + ' · ' + g.title;
  tagRow.appendChild(tagTopic);
  const tagType = document.createElement('span');
  tagType.className = 'tag type';
  tagType.textContent = '写代码';
  tagRow.appendChild(tagType);
  if(code.mastered[g.id]){
    const tagDone = document.createElement('span');
    tagDone.className = 'tag';
    tagDone.style.background = 'var(--correct-bg)';
    tagDone.style.color = '#1E5E3D';
    tagDone.textContent = '✓ 已掌握';
    tagRow.appendChild(tagDone);
  }
  card.appendChild(tagRow);

  const prompt = document.createElement('div');
  prompt.className = 'prompt';
  prompt.textContent = v.prompt;
  card.appendChild(prompt);

  // 提示区
  const hintBox = document.createElement('div');
  hintBox.className = 'hint-box';
  hintBox.style.display = 'none';
  card.appendChild(hintBox);

  const hintActions = document.createElement('div');
  hintActions.className = 'hint-actions';
  const hintBtn = document.createElement('button');
  hintBtn.className = 'btn ghost';
  hintBtn.textContent = '💡 给点提示 (' + v.hints.length + ')';
  hintBtn.addEventListener('click', ()=>{
    if(code.hintCount < v.hints.length) code.hintCount++;
    hintBox.style.display = 'block';
    hintBox.innerHTML = '<b>提示：</b><ol>' + v.hints.slice(0,code.hintCount).map(h=>'<li>'+h+'</li>').join('') + '</ol>';
    if(code.hintCount >= v.hints.length) hintBtn.disabled = true;
  });
  hintActions.appendChild(hintBtn);
  card.appendChild(hintActions);

  // 代码编辑框
  const editor = document.createElement('textarea');
  editor.className = 'editor';
  editor.id = 'codeEditor';
  editor.value = v.starter;
  editor.spellcheck = false;
  editor.addEventListener('keydown', e=>{
    if(e.key === 'Tab'){
      e.preventDefault();
      const start = editor.selectionStart, end = editor.selectionEnd;
      editor.value = editor.value.slice(0,start) + '    ' + editor.value.slice(end);
      editor.selectionStart = editor.selectionEnd = start + 4;
    }
  });
  card.appendChild(editor);

  const feedback = document.createElement('div');
  feedback.className = 'feedback';

  const runRow = document.createElement('div');
  runRow.className = 'run-row';

  const runBtn = document.createElement('button');
  runBtn.className = 'btn';
  runBtn.id = 'runBtn';
  runBtn.textContent = '▶ 运行测试';
  runBtn.disabled = !pyodideReady;
  runBtn.addEventListener('click', async ()=>{
    runBtn.disabled = true;
    runBtn.textContent = '运行中…';
    const result = await runPythonCheck(editor.value, v.test);
    runBtn.disabled = false;
    runBtn.textContent = '▶ 运行测试';
    feedback.className = 'feedback show ' + (result.ok ? 'ok':'bad');
    feedback.innerHTML = '';
    const head = document.createElement('div');
    head.className = 'head';
    if(result.ok){
      head.textContent = '🎉 全部测试通过！这个知识点已掌握';
      feedback.appendChild(head);
      code.mastered[g.id] = true;
      saveCodeProgress();
      renderScorebar();
      const nextBtn2 = document.createElement('button');
      nextBtn2.className = 'btn';
      nextBtn2.style.marginTop = '10px';
      nextBtn2.textContent = '下一个知识点 →';
      nextBtn2.addEventListener('click', ()=>{
        code.groupIndex++;
        pickVariant(null);
        renderCodeQuestion();
      });
      feedback.appendChild(nextBtn2);
    }else{
      head.textContent = '❌ 还没通过，再试试看';
      const body = document.createElement('div');
      body.textContent = '错误信息（可以帮你排查问题）：';
      const pre = document.createElement('pre');
      pre.textContent = result.error;
      feedback.appendChild(head); feedback.appendChild(body); feedback.appendChild(pre);
    }
  });
  runRow.appendChild(runBtn);

  const resetBtn = document.createElement('button');
  resetBtn.className = 'btn ghost';
  resetBtn.textContent = '重置代码';
  resetBtn.addEventListener('click', ()=>{ editor.value = v.starter; feedback.className='feedback'; feedback.innerHTML=''; });
  runRow.appendChild(resetBtn);

  const revealBtn = document.createElement('button');
  revealBtn.className = 'btn warn';
  revealBtn.textContent = '👀 查看答案';
  revealBtn.addEventListener('click', ()=>{
    code.revealed = true;
    code.mastered[g.id] = false;
    saveCodeProgress();
    renderScorebar();
    renderSolution();
  });
  runRow.appendChild(revealBtn);

  card.appendChild(runRow);
  card.appendChild(feedback);

  const solutionSlot = document.createElement('div');
  solutionSlot.id = 'solutionSlot';
  card.appendChild(solutionSlot);

  function renderSolution(){
    solutionSlot.innerHTML = '';
    const box = document.createElement('div');
    box.className = 'solution-box';
    const head = document.createElement('div');
    head.className = 'solution-head';
    head.textContent = '参考答案（这道题已标记为待巩固）';
    const pre = document.createElement('pre');
    pre.className = 'code-block';
    pre.style.margin = '0';
    pre.textContent = v.solution;
    box.appendChild(head); box.appendChild(pre);
    solutionSlot.appendChild(box);

    const retryBtn = document.createElement('button');
    retryBtn.className = 'btn';
    retryBtn.style.marginTop = '12px';
    retryBtn.textContent = '🔄 练习同类新题';
    retryBtn.addEventListener('click', ()=>{
      pickVariant(v.id);
      renderCodeQuestion();
    });
    solutionSlot.appendChild(retryBtn);
  }

  if(code.revealed) renderSolution();

  updatePyoStatus();
}

/* =========================================================
   初始化
   ========================================================= */
(async function init(){
  await loadProgress();
  buildMcqPool();
  buildCodePool();
  renderMap();
  renderScorebar();
  renderMcqQuestion();
  ensurePyodide(); // 后台悄悄开始加载，不阻塞选择题模式的使用
})();
</script>
</body>
</html>
